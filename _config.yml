title: Open Responses Server
description: >-
  A plug-and-play server that speaks OpenAI's Responses API—no matter which AI backend you're running.
baseurl: ""
url: "https://open-responses-server.teabranch.dev"

theme: just-the-docs
color_scheme: anthropic

search_enabled: true
search:
  button: true

aux_links:
  "GitHub":
    - "https://github.com/teabranch/open-responses-server"
aux_links_new_tab: true

footer_content: >-
  Open Responses Server — Licensed under
  <a href="https://github.com/teabranch/open-responses-server/blob/main/LICENSE">MIT</a>.

plugins:
  - jekyll-seo-tag
  - jekyll-relative-links
  - jekyll-sitemap

relative_links:
  enabled: true
  collections: false

defaults:
  - scope:
      path: ""
    values:
      layout: "default"

exclude:
  - README.md
  - CLAUDE.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - .gitignore
  - .github/
  - .claude/
  - src/
  - tests/
  - test_tools/
  - demo/
  - examples/
  - pyproject.toml
  - uv.lock
  - run_tests.sh
  - release.py
  - start.py
  - Dockerfile
  - sonar-project.properties
  - __pycache__/
  - resources/
